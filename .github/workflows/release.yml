name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build -w extension

      - name: Create ZIP
        run: |
          cd extension/dist
          zip -r ../../apartment-messenger-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apartment-messenger-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## New Installation

            1. Download `apartment-messenger-${{ github.ref_name }}.zip` below
            2. Unzip the file
            3. Open `chrome://extensions/` in Chrome
            4. Enable **Developer mode** (top right)
            5. Click **Load unpacked** and select the unzipped folder
            6. Open the extension side panel → Settings → Paste your [Gemini API key](https://aistudio.google.com/app/apikey)
            7. Done!

            ## Updating from a Previous Version

            1. Download `apartment-messenger-${{ github.ref_name }}.zip` below
            2. Unzip the file **to the same location** where you have the previous version, replacing all files when prompted
            3. Go to `chrome://extensions/` and click the **reload** button (↻ circular arrow) on the extension card
            4. That's it — your settings and data are preserved automatically
